<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-nour" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0.1" />
    </radialGradient>
    <linearGradient id="jacket-nour" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#B0BEC5" />
    </linearGradient>
    <linearGradient id="collar-nour" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFA000" />
      <stop offset="100%" stop-color="#FFD700" />
    </linearGradient>
    <linearGradient id="skin-nour" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFECB3" />
      <stop offset="50%" stop-color="#FFE082" />
      <stop offset="100%" stop-color="#FFCA28" />
    </linearGradient>
    <linearGradient id="hair-nour" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E2723" />
      <stop offset="50%" stop-color="#27110B" />
      <stop offset="100%" stop-color="#1A0C08" />
    </linearGradient>
    <filter id="glow-nour" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="200" cy="200" r="190" fill="url(#bg-nour)" />
  <circle cx="200" cy="200" r="185" fill="none" stroke="#FFD700" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="15 10" />

  <!-- Body / White High-Collar Jacket -->
  <path d="M110 380 C110 300, 290 300, 290 380 Z" fill="url(#jacket-nour)" />
  <!-- High Tech Gold Collar -->
  <path d="M150 380 L160 310 L240 310 L250 380 Z" fill="url(#collar-nour)" opacity="0.9" />
  <path d="M170 310 L200 350 L230 310" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.8" />

  <!-- Neck -->
  <path d="M175 250 L225 250 L220 315 L180 315 Z" fill="url(#skin-nour)" />
  <ellipse cx="200" cy="275" rx="18" ry="6" fill="#FF8F00" opacity="0.3" />

  <!-- Elegant Futuristic Bun Hair (Top) -->
  <circle cx="200" cy="80" r="35" fill="url(#hair-nour)" />
  <!-- Gold Hairpin / Cybernetic ring around bun -->
  <ellipse cx="200" cy="80" rx="38" ry="12" fill="none" stroke="#FFD700" stroke-width="5" filter="url(#glow-nour)" />

  <!-- Head/Face -->
  <ellipse cx="200" cy="200" rx="60" ry="78" fill="url(#skin-nour)" />

  <!-- Ears -->
  <ellipse cx="137" cy="195" rx="10" ry="16" fill="url(#skin-nour)" />
  <ellipse cx="263" cy="195" rx="10" ry="16" fill="url(#skin-nour)" />
  <!-- Gold Cyber Earrings -->
  <circle cx="137" cy="205" r="4" fill="#FFD700" filter="url(#glow-nour)" />
  <circle cx="263" cy="205" r="4" fill="#FFD700" filter="url(#glow-nour)" />

  <!-- Eyes (Sharp elegant) -->
  <ellipse cx="172" cy="185" rx="13" ry="9" fill="#FFFFFF" />
  <ellipse cx="228" cy="185" rx="13" ry="9" fill="#FFFFFF" />
  <circle cx="172" cy="185" r="6.5" fill="#FF8F00" />
  <circle cx="228" cy="185" r="6.5" fill="#FF8F00" />
  <circle cx="174" cy="183" r="2" fill="#FFFFFF" />
  <circle cx="230" cy="183" r="2" fill="#FFFFFF" />
  <!-- Eyelashes / Winged eyeliner -->
  <path d="M155 182 Q172 172 188 182 Q192 178 190 176" fill="none" stroke="#1A0C08" stroke-width="3.5" stroke-linecap="round" />
  <path d="M212 182 Q228 172 245 182 Q248 178 246 176" fill="none" stroke="#1A0C08" stroke-width="3.5" stroke-linecap="round" />

  <!-- Eyebrows (Elegant High Arch) -->
  <path d="M156 166 Q172 156 186 165" fill="none" stroke="#1A0C08" stroke-width="3.5" stroke-linecap="round" />
  <path d="M214 165 Q228 156 244 166" fill="none" stroke="#1A0C08" stroke-width="3.5" stroke-linecap="round" />

  <!-- Nose -->
  <path d="M200 192 L204 212 L196 212" fill="none" stroke="#B08D57" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Mouth / Sophisticated smile -->
  <path d="M185 238 Q200 248 215 238 Q200 241 185 238 Z" fill="#C2185B" />

  <!-- Cybernetic Face Markings / Gold accents under eyes -->
  <path d="M165 202 L178 202" stroke="#FFD700" stroke-width="3" stroke-linecap="round" filter="url(#glow-nour)" opacity="0.8" />
  <path d="M222 202 L235 202" stroke="#FFD700" stroke-width="3" stroke-linecap="round" filter="url(#glow-nour)" opacity="0.8" />

  <!-- Front Hair / Sleek Pulled Back -->
  <path d="M140 165 Q150 110 200 100 Q250 110 260 165 Q250 120 200 115 Q150 120 140 165 Z" fill="url(#hair-nour)" />
  <!-- Hair line accents -->
  <path d="M160 130 Q180 110 200 115" fill="none" stroke="#5D4037" stroke-width="2" opacity="0.5" />
  <path d="M240 130 Q220 110 200 115" fill="none" stroke="#5D4037" stroke-width="2" opacity="0.5" />
</svg>
