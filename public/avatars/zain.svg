<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-zain" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#004D40" stop-opacity="0.1" />
    </radialGradient>
    <linearGradient id="hoodie-zain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#0A0A0A" />
    </linearGradient>
    <linearGradient id="visor-zain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="50%" stop-color="#00838F" />
      <stop offset="100%" stop-color="#003B46" />
    </linearGradient>
    <linearGradient id="skin-zain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE0B2" />
      <stop offset="50%" stop-color="#FFB74D" />
      <stop offset="100%" stop-color="#FB8C00" />
    </linearGradient>
    <filter id="glow-zain" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="200" cy="200" r="190" fill="url(#bg-zain)" />
  <circle cx="200" cy="200" r="185" fill="none" stroke="#00E5FF" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="10 10" />

  <!-- Body / Dark Hoodie -->
  <path d="M100 380 C100 290, 300 290, 300 380 Z" fill="url(#hoodie-zain)" stroke="#00E5FF" stroke-width="2" stroke-opacity="0.3" />
  <!-- Inner Hoodie Strings & Zipper -->
  <line x1="200" y1="340" x2="200" y2="380" stroke="#00E5FF" stroke-width="2" opacity="0.6" />
  <path d="M165 340 L165 380" stroke="#333" stroke-width="4" stroke-linecap="round" />
  <path d="M235 340 L235 380" stroke="#333" stroke-width="4" stroke-linecap="round" />

  <!-- Neck -->
  <path d="M175 250 L225 250 L220 340 L180 340 Z" fill="url(#skin-zain)" />
  <ellipse cx="200" cy="275" rx="20" ry="7" fill="#E65100" opacity="0.4" />

  <!-- Head/Face -->
  <ellipse cx="200" cy="200" rx="60" ry="78" fill="url(#skin-zain)" />

  <!-- Ears -->
  <ellipse cx="137" cy="195" rx="10" ry="16" fill="url(#skin-zain)" />
  <ellipse cx="263" cy="195" rx="10" ry="16" fill="url(#skin-zain)" />

  <!-- Cybernetic Ear Implants / Headset base -->
  <rect x="127" y="185" width="8" height="20" rx="4" fill="#00E5FF" filter="url(#glow-zain)" opacity="0.8" />
  <rect x="265" y="185" width="8" height="20" rx="4" fill="#00E5FF" filter="url(#glow-zain)" opacity="0.8" />

  <!-- Nose -->
  <path d="M200 195 L205 212 L195 212" fill="none" stroke="#D84315" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Mouth / Stern Hacker Expression -->
  <path d="M185 240 L215 240" stroke="#BF360C" stroke-width="3.5" stroke-linecap="round" />

  <!-- Futuristic Cyber Visor / Glasses -->
  <path d="M140 170 L260 170 L250 200 L210 200 L200 190 L190 200 L150 200 Z" fill="url(#visor-zain)" stroke="#00E5FF" stroke-width="2" filter="url(#glow-zain)" opacity="0.9" />
  <!-- Visor Data Lines / Reflection -->
  <line x1="155" y1="180" x2="185" y2="180" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
  <line x1="215" y1="180" x2="245" y2="180" stroke="#FFFFFF" stroke-width="2" opacity="0.8" />
  <circle cx="170" cy="190" r="3" fill="#FFFFFF" filter="url(#glow-zain)" />
  <circle cx="230" cy="190" r="3" fill="#FFFFFF" filter="url(#glow-zain)" />

  <!-- Hoodie Hood covering top of head -->
  <path d="M110 250 C100 120, 140 70, 200 70 C260 70, 300 120, 290 250 C270 140, 240 100, 200 100 C160 100, 130 140, 110 250 Z" fill="url(#hoodie-zain)" stroke="#333333" stroke-width="3" />
</svg>
